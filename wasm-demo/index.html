<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>step2glb · wasm demo</title>
    <!-- <model-viewer> renders the resulting GLB without any extra build step -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"
    ></script>
    <style>
      body {
        font: 14px/1.5 system-ui, sans-serif;
        margin: 0;
        background: #1a1a1d;
        color: #ddd;
      }
      header {
        padding: 12px 16px;
        background: #232327;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button {
        font: inherit;
        padding: 6px 14px;
        border: 0;
        border-radius: 6px;
        background: #4b8;
        color: #042;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #status {
        opacity: 0.8;
      }
      main {
        display: flex;
        height: calc(100vh - 56px);
      }
      model-viewer {
        flex: 1;
        background: #1a1a1d;
      }
      #info {
        width: 320px;
        overflow: auto;
        padding: 12px 16px;
        background: #202024;
        border-left: 1px solid #333;
        font-size: 13px;
      }
      #info h3 {
        margin: 0 0 8px;
        word-break: break-all;
      }
      #info details {
        margin: 8px 0;
      }
      #info summary {
        cursor: pointer;
        color: #9cf;
      }
      input[type='file'] {
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>step2glb</strong>
      <button id="sample">Sample (box − cylinder)</button>
      <label><input id="file" type="file" accept=".step,.stp,.STEP,.STP" /></label>
      <label title="chordal deflection (mm): coarser = fewer triangles = faster">
        deflection
        <input id="deflection" type="range" min="0.05" max="5" step="0.05" value="1" />
        <span id="deflVal">1.00</span> mm
      </label>
      <label title="max chord turn angle (°): smaller = rounder curves, more triangles">
        max-angle
        <input id="maxangle" type="range" min="10" max="45" step="1" value="25" />
        <span id="maxangleVal">25</span>°
      </label>
      <label title="rotate Z-up (STEP) to glTF Y-up"
        ><input id="yup" type="checkbox" checked /> Y-up</label
      >
      <label title="keep per-vertex normals (larger; off = viewer flat-shades)"
        ><input id="normals" type="checkbox" /> normals</label
      >
      <label title="merged: one node/mesh per color baked to world (vs per-part node tree). Always in-RAM — it does not stream, so the memory ceiling does not apply."
        ><input id="merged" type="checkbox" /> merged</label
      >
      <label title="rvm-style position weld (drops normals; simplify needs meshopt, omitted in wasm)"
        ><input id="cleanup" type="checkbox" /> cleanup</label
      >
      <label
        id="memLabel"
        title="memory ceiling: above this, the (hierarchical) converter spills geometry to OPFS so peak RAM stays bounded. Disabled in merged mode, which is always in-RAM."
      >
        memory
        <input id="mem" type="range" min="100" max="2000" step="100" value="512" />
        <span id="memVal">512</span> MB
      </label>
      <button id="download" disabled>Export GLB</button>
      <span id="status">loading wasm…</span>
    </header>
    <main>
      <model-viewer
        style="height:100%"
        id="viewer"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
      ></model-viewer>
      <aside id="info"></aside>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
