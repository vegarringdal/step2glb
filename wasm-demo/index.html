<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Step2Glb</title>
    <!-- <model-viewer> renders the resulting GLB without any extra build step -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"
    ></script>
    <style>
      :root {
        --h: 48px;
        --footer-h: 50px;
        --w-config: 300px;
        --w-info: 340px;
        --bg: #16161a;
        --panel: #1e1e24;
        --header: #1b1b20;
        --border: #2d2d36;
        --text: #d9d9e0;
        --muted: #8a8a96;
        --accent: #34d3b0;
        --accent-ink: #042b22;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        font: 14px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      /* ---------- header ---------- */
      header {
        height: var(--h);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 10px;
        background: var(--header);
        border-bottom: 1px solid var(--border);
      }
      .brand {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      .brand b {
        color: var(--accent);
      }
      .gh {
        color: var(--muted);
        display: inline-flex;
        align-items: center;
      }
      .gh:hover {
        color: var(--text);
      }
      #status {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 38vw;
      }
      .icon-btn {
        background: transparent;
        border: 0;
        color: var(--text);
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font: inherit;
        line-height: 1;
      }
      .icon-btn:hover {
        background: var(--border);
      }

      /* ---------- layout ---------- */
      .layout {
        display: flex;
        height: calc(100% - var(--h) - var(--footer-h));
        overflow: hidden;
      }

      /* ---------- footer action bar ---------- */
      footer {
        height: var(--footer-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 12px;
        background: var(--header);
        border-top: 1px solid var(--border);
      }
      .stage {
        flex: 1;
        position: relative;
        min-width: 0;
        background: var(--bg);
      }
      model-viewer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
      }
      .empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        color: var(--muted);
        pointer-events: none;
      }

      /* ---------- panels ---------- */
      .panel {
        display: flex;
        flex-direction: column;
        background: var(--panel);
        flex-shrink: 0;
      }
      .panel-left {
        width: var(--w-config);
        border-right: 1px solid var(--border);
        transition: margin-left 0.25s ease;
      }
      .panel-right {
        width: var(--w-info);
        border-left: 1px solid var(--border);
        transition: margin-right 0.25s ease;
      }
      body:not(.config-open) .panel-left {
        margin-left: calc(-1 * var(--w-config));
      }
      body:not(.info-open) .panel-right {
        margin-right: calc(-1 * var(--w-info));
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        font-size: 13px;
      }
      .panel-body {
        flex: 1;
        overflow: auto;
      }

      /* ---------- config controls ---------- */
      section {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      section h2 {
        margin: 0 0 4px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .field {
        display: block;
        margin: 12px 0 4px;
      }
      .field-label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .field input[type='range'] {
        width: 100%;
        accent-color: var(--accent);
      }
      .field input[type='file'] {
        width: 100%;
        color: var(--muted);
        font: inherit;
      }
      .hint {
        display: block;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
        margin-top: 4px;
      }
      output {
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }
      .hint code {
        background: #2a2a32;
        border-radius: 4px;
        padding: 0 4px;
        font-size: 11px;
      }
      .check {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 8px 0;
        cursor: pointer;
      }
      .check input {
        margin: 3px 0 0;
        accent-color: var(--accent);
        flex-shrink: 0;
      }
      .check b {
        font-weight: 600;
        font-size: 13px;
      }
      .check small {
        display: block;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
        margin-top: 2px;
      }
      .btn {
        font: inherit;
        font-size: 13px;
        padding: 6px 12px;
        border: 0;
        border-radius: 7px;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-primary {
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 600;
      }
      .btn-ghost {
        background: #2a2a32;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      /* ---------- info / report ---------- */
      #info {
        padding: 14px 16px;
        font-size: 13px;
      }
      #info:empty::before {
        content: 'Convert a STEP file to see the conversion report.';
        color: var(--muted);
      }
      #info h3 {
        margin: 0 0 8px;
        word-break: break-all;
        font-size: 14px;
      }
      #info details {
        margin: 8px 0;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
      }
      #info summary {
        cursor: pointer;
        color: var(--accent);
      }
      #info details > div {
        margin: 4px 0;
        padding-left: 6px;
      }

      /* ---------- backdrop (mobile drawers) ---------- */
      .backdrop {
        display: none;
      }

      /* ---------- responsive: panels become overlay drawers ---------- */
      @media (max-width: 820px) {
        .panel {
          position: fixed;
          top: var(--h);
          bottom: var(--footer-h);
          z-index: 30;
          width: min(86vw, 340px);
          margin: 0 !important;
        }
        .panel-left {
          left: 0;
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }
        .panel-right {
          right: 0;
          transform: translateX(100%);
          transition: transform 0.25s ease;
        }
        body.config-open .panel-left,
        body.info-open .panel-right {
          transform: none;
        }
        body.config-open .backdrop,
        body.info-open .backdrop {
          display: block;
          position: fixed;
          inset: var(--h) 0 var(--footer-h) 0;
          background: rgba(0, 0, 0, 0.55);
          z-index: 25;
        }
        #status {
          max-width: 30vw;
        }
      }
    </style>
  </head>
  <body>
    <!-- set the settings panel's initial state before first paint: open on wide
         screens, closed on narrow ones (where it is an overlay drawer) — avoids
         a slide-out flash on mobile load -->
    <script>
      if (!window.matchMedia('(max-width: 820px)').matches)
        document.body.classList.add('config-open');
    </script>
    <header>
      <button id="menuToggle" class="icon-btn" aria-label="Toggle settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <span class="brand">Step2<b>Glb</b></span>
      <a
        class="gh"
        href="https://github.com/vegarringdal/step2glb"
        target="_blank"
        rel="noopener"
        title="View on GitHub"
        aria-label="View on GitHub"
      >
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
        </svg>
      </a>
      <span id="status">loading wasm…</span>
      <button id="infoToggle" class="icon-btn" aria-label="Toggle report" title="Conversion report">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9" />
          <line x1="12" y1="11" x2="12" y2="16" />
          <line x1="12" y1="8" x2="12" y2="8" />
        </svg>
        Report
      </button>
    </header>

    <div class="layout">
      <!-- ---------- left: configuration ---------- -->
      <aside class="panel panel-left">
        <div class="panel-head">
          <span>Settings</span>
          <button id="configClose" class="icon-btn" aria-label="Close settings" title="Close">✕</button>
        </div>
        <div class="panel-body">
          <section>
            <h2>Input</h2>
            <label class="field">
              <span class="field-label">STEP file</span>
              <input id="file" type="file" accept=".step,.stp,.STEP,.STP" />
              <span class="hint">Pick a <code>.step</code> / <code>.stp</code> file. It is converted entirely in your browser — nothing is uploaded.</span>
            </label>
          </section>

          <section>
            <h2>Tessellation</h2>
            <label class="field">
              <span class="field-label"><span>Deflection</span><span><output id="deflVal">1.00</output> mm</span></span>
              <input id="deflection" type="range" min="0.05" max="5" step="0.05" value="1" />
              <span class="hint">Chordal deflection: how far a triangle may stray from the true surface. Coarser = fewer triangles, faster.</span>
            </label>
            <label class="field">
              <span class="field-label"><span>Max angle</span><span><output id="maxangleVal">25</output>°</span></span>
              <input id="maxangle" type="range" min="10" max="45" step="1" value="25" />
              <span class="hint">Max chord turn angle per segment. Smaller = rounder curves, more triangles.</span>
            </label>
          </section>

          <section>
            <h2>Output</h2>
            <label class="check">
              <input id="yup" type="checkbox" checked />
              <span><b>Y-up</b><small>Rotate Z-up (STEP) to glTF's Y-up convention.</small></span>
            </label>
            <label class="check">
              <input id="normals" type="checkbox" />
              <span><b>Keep normals</b><small>Per-vertex normals (larger file). Off lets the viewer flat-shade. Exclusive with cleanup.</small></span>
            </label>
            <label class="check">
              <input id="merged" type="checkbox" />
              <span><b>Merged</b><small>One mesh per colour baked to world space, instead of a per-part node tree. Always in-RAM.</small></span>
            </label>
            <label class="check">
              <input id="cleanup" type="checkbox" checked />
              <span><b>Cleanup</b><small>RVM-style position weld. Welding drops normals, so this is exclusive with “keep normals”.</small></span>
            </label>
            <label class="check">
              <input id="render" type="checkbox" checked />
              <span><b>Render result</b><small>Show the GLB in the viewer. Turn off to isolate the converter's memory footprint.</small></span>
            </label>
          </section>

          <section id="memSection">
            <h2>Memory</h2>
            <label class="field" id="memLabel">
              <span class="field-label"><span>Ceiling</span><span><output id="memVal">100</output> MB</span></span>
              <input id="mem" type="range" min="100" max="2000" step="100" value="100" />
              <span class="hint">Best-effort, not a hard cap. A file larger than this switches the hierarchical converter to streaming: the input is read from OPFS by range and each finished mesh is spilled to OPFS, instead of loading everything into RAM. What it <em>can't</em> stream still has to fit: the entity offset index (grows with entity count) and one part at a time — a single huge solid is tessellated whole, so it can still blow past the ceiling. Truly large files need the index itself on disk and big parts split. Disabled in merged mode (always in-RAM).</span>
            </label>
          </section>

        </div>
      </aside>

      <!-- ---------- center: viewer ---------- -->
      <div class="stage">
        <model-viewer
          id="viewer"
          camera-controls
          auto-rotate
          shadow-intensity="1"
          exposure="1"
        ></model-viewer>
        <div id="empty" class="empty">Load the sample or pick a STEP file to begin.</div>
      </div>

      <!-- ---------- right: report ---------- -->
      <aside class="panel panel-right">
        <div class="panel-head">
          <span>Conversion report</span>
          <button id="infoClose" class="icon-btn" aria-label="Close report" title="Close">✕</button>
        </div>
        <div id="info" class="panel-body"></div>
      </aside>
    </div>

    <footer>
      <button id="sample" class="btn btn-primary">Load sample (box − cylinder)</button>
      <button id="download" class="btn btn-ghost" disabled>Export GLB</button>
    </footer>

    <div id="backdrop" class="backdrop"></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
